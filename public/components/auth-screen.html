<section class="auth-screen" id="auth-screen" style="display: none;">
  <form class="auth-panel" id="auth-form">
    <div class="auth-brand">
      <svg class="brand-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
      </svg>
      <div>
        <h1>XML Sigma</h1>
        <p>Acesso restrito da operacao fiscal</p>
      </div>
    </div>

    <div class="form-group">
      <label for="auth-email">Email</label>
      <input type="email" id="auth-email" autocomplete="email" required>
    </div>

    <div class="form-group">
      <label for="auth-password">Senha</label>
      <input type="password" id="auth-password" autocomplete="current-password" required>
    </div>

    <button type="submit" class="btn btn-primary" id="auth-submit">
      <span>Entrar</span>
    </button>
    <p class="auth-message" id="auth-message"></p>
  </form>
</section>
