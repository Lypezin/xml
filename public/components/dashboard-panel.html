<div id="view-dashboard-content" class="tab-content active dashboard-overview">
  <div class="dashboard-header-flex">
    <div class="hero-copy">
      <span class="eyebrow">Visão geral</span>
      <h2>Painel das cidades</h2>
      <p class="dashboard-lead">Resumo operacional por certificado — totais, status e última emissão.</p>
    </div>
    <button id="btn-refresh-dashboard" class="btn btn-secondary btn-icon-only" type="button" title="Atualizar painel" aria-label="Atualizar painel">
      <svg class="refresh-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" aria-hidden="true">
        <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path>
      </svg>
    </button>
  </div>

  <div class="dashboard-metrics-summary" id="dashboard-metrics-summary">
    <div class="mini-metric-card">
      <div class="mini-metric-icon" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M5 21V7l7-4 7 4v14"/><path d="M9 21v-4h6v4"/></svg>
      </div>
      <div class="metric-info">
        <span class="metric-label">Cidades</span>
        <span class="metric-number" id="dash-stat-cities">0</span>
      </div>
    </div>
    <div class="mini-metric-card">
      <div class="mini-metric-icon accent" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      </div>
      <div class="metric-info">
        <span class="metric-label">Ativas</span>
        <span class="metric-number" id="dash-stat-active">0</span>
      </div>
    </div>
    <div class="mini-metric-card">
      <div class="mini-metric-icon" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      </div>
      <div class="metric-info">
        <span class="metric-label">Total XMLs</span>
        <span class="metric-number" id="dash-stat-xmls">0</span>
      </div>
    </div>
  </div>

  <div id="dashboard-loader" class="xml-empty-state" style="margin-top: 40px; display: none;">
    <span>Buscando informações das cidades...</span>
  </div>

  <div class="dashboard-section-label">Unidades / certificados</div>
  <div class="dashboard-cities-grid" id="dashboard-cities-grid"></div>
</div>
