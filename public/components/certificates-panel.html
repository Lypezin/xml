<div id="view-certificado-content" class="tab-content" style="display: none;">
  <div class="split-grid" style="grid-template-columns: 1fr;">
    <section class="card" id="card-certificado-view">
      <div class="card-header">
        <h2>Configuração do Certificado Digital A1</h2>
      </div>

      <div class="cert-list-panel">
        <div class="cert-list-header">
          <h3>Certificados cadastrados</h3>
          <span id="cert-count-label">0 certificados</span>
        </div>
        <div id="cert-list" class="cert-list">
          <div class="empty-cert-list">Nenhum certificado cadastrado.</div>
        </div>
      </div>
      
      <!-- Upload Certificate Form -->
      <div id="cert-upload-state-view" class="cert-state active">
        <form id="form-cert-view" enctype="multipart/form-data">
          <div class="drop-zone" id="drop-zone-view">
            <svg class="drop-zone-icon-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="17 8 12 3 7 8"></polyline>
              <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            <span class="drop-zone-text">Arraste seu certificado <strong>.pfx</strong> ou <strong>.p12</strong> aqui ou clique para selecionar</span>
            <input type="file" id="file-cert-view" name="pfx" accept=".pfx,.p12" style="display: none;">
            <div id="file-name-preview-view" class="file-name-preview"></div>
          </div>
          
          <div class="input-group">
            <label for="passphrase-view">Senha do Certificado:</label>
            <input type="password" id="passphrase-view" placeholder="Senha de segurança do PFX" required>
          </div>

          <div class="input-group">
            <label for="cert-cnpj-view">CNPJ da empresa titular do certificado:</label>
            <input type="text" id="cert-cnpj-view" placeholder="Informe se o sistema nao identificar automaticamente">
          </div>

          <button type="submit" class="btn btn-primary" id="btn-save-cert-view">
            <span>Salvar e Validar Certificado</span>
          </button>
        </form>
      </div>

      <!-- Certificate Active State -->
      <div id="cert-active-state-view" class="cert-state">
        <div class="success-banner" style="margin-bottom: 24px;">
          <svg class="success-icon-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
          <div>
            <h3 id="active-cert-name-view">Certificado Ativo</h3>
            <p id="active-cert-cnpj-view">CNPJ: --</p>
          </div>
        </div>
        <button class="btn btn-danger btn-sm" id="btn-replace-cert-view">
          Remover Certificado Ativo
        </button>
        <button class="btn btn-secondary btn-sm" id="btn-diagnose-cert-view" style="margin-left: 8px;">
          Diagnosticar Certificado
        </button>
      </div>
    </section>
  </div>
</div>
