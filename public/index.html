<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestão NFS-e Nacional</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <meta name="theme-color" content="#f8fafc">
  <meta name="description" content="Gestão de XMLs NFS-e Nacional por unidade com varredura ADN e cancelamentos.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <!-- Tema antes do paint para evitar flash -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('theme');
        if (t === 'dark') document.documentElement.classList.add('theme-dark-boot');
      } catch (e) {}
    })();
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/buttons.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/layout-shell-a.css">
  <link rel="stylesheet" href="css/layout-shell-b.css">
  <link rel="stylesheet" href="css/layout-panels-a.css">
  <link rel="stylesheet" href="css/layout-panels-b.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/metrics.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/console.css">
  <link rel="stylesheet" href="css/dashboard-cards.css">
  <link rel="stylesheet" href="css/dashboard-skeletons.css">
  <link rel="stylesheet" href="css/certificates.css">
  <link rel="stylesheet" href="css/table-list.css">
  <link rel="stylesheet" href="css/table-item.css">
  <link rel="stylesheet" href="css/ops-screen.css">
  <link rel="stylesheet" href="css/dashboard-premium.css">
  <link rel="stylesheet" href="css/toast.css">
  <link rel="stylesheet" href="css/rules-screen.css">
  <link rel="stylesheet" href="css/mobile-shell.css">
  <link rel="stylesheet" href="css/responsive-a.css">
  <link rel="stylesheet" href="css/responsive-b.css">
  <link rel="stylesheet" href="css/motion.css">
  <link rel="stylesheet" href="css/insights.css">
</head>
<body class="light-mode">
  <div class="glass-bg"></div>

  <div id="auth-screen-container"></div>

  <div class="app-layout" id="app-layout" style="display: none;">
    <div class="sidebar-backdrop" id="sidebar-backdrop" aria-hidden="true"></div>
    <div id="sidebar-container"></div>

    <main class="main-content">
      <header class="navbar">
        <div class="navbar-left">
          <button type="button" class="btn-sidebar-toggle" id="btn-sidebar-toggle" aria-label="Abrir menu" aria-controls="sidebar-container" aria-expanded="false">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="4" y1="7" x2="20" y2="7"></line>
              <line x1="4" y1="12" x2="20" y2="12"></line>
              <line x1="4" y1="17" x2="20" y2="17"></line>
            </svg>
          </button>
          <div class="navbar-title">
            <p class="navbar-eyebrow" id="page-breadcrumb">NFS-e Ops</p>
            <h1 id="page-title"></h1>
            <p id="page-subtitle">Gestão de XMLs da NFS-e Nacional por unidade</p>
          </div>
        </div>

        <div class="navbar-actions">
          <div class="cert-status-badge cert-chip" title="Certificado em uso">
            <span class="status-indicator" id="navbar-cert-indicator"></span>
            <span class="cert-chip-text" id="navbar-cert-text">Verificando certificado...</span>
          </div>
          <div class="user-menu">
            <div class="user-menu-meta">
              <span class="user-menu-label">Sessão</span>
              <span id="auth-user-email">Sessão ativa</span>
            </div>
            <button class="btn btn-secondary btn-sm" id="btn-logout" type="button">Sair</button>
          </div>
        </div>
      </header>

      <div id="view-dashboard-container"></div>
      <div id="view-download-container"></div>
      <div id="view-certificado-container"></div>
      <div id="view-regras-container"></div>

      <footer class="app-footer">
        <p>NFS-e Ops · ADN Nacional · cancelamentos · exportação · operação por unidade</p>
      </footer>
    </main>
  </div>

  <!-- Drawer de detalhe da nota -->
  <div class="doc-drawer-backdrop" id="doc-drawer-backdrop" hidden></div>
  <aside class="doc-drawer" id="doc-drawer" aria-hidden="true" aria-label="Detalhe da nota">
    <div class="doc-drawer-header">
      <div>
        <span class="eyebrow">Documento</span>
        <h2 id="doc-drawer-title">Detalhe da NFS-e</h2>
      </div>
      <button type="button" class="btn btn-secondary btn-sm" id="doc-drawer-close">Fechar</button>
    </div>
    <div class="doc-drawer-body" id="doc-drawer-body"></div>
  </aside>

  <script src="js/utils.js" defer></script>
  <script src="js/toast.js" defer></script>
  <script src="js/dataCache.js" defer></script>
  <script src="js/panels-bundle.js" defer></script>
  <script src="js/apiAuth.js" defer></script>
  <script src="js/apiCerts.js" defer></script>
  <script src="js/apiData.js" defer></script>
  <script src="js/apiDownloads.js" defer></script>
  <script src="js/uiElements.js" defer></script>
  <script src="js/uiTableCore.js" defer></script>
  <script src="js/uiTableLoading.js" defer></script>
  <script src="js/uiTableRender.js" defer></script>
  <script src="js/uiCore.js" defer></script>
  <script src="js/uiCerts.js" defer></script>
  <script src="js/uiProgress.js" defer></script>
  <script src="js/uiTabs.js" defer></script>
  <script src="js/unitsController.js" defer></script>
  <script src="js/historyController.js" defer></script>
  <script src="js/certStatusController.js" defer></script>
  <script src="js/syncController.js" defer></script>
  <script src="js/queryLoop.js" defer></script>
  <script src="js/dashboardController.js" defer></script>
  <script src="js/insightsController.js" defer></script>
  <script src="js/docDrawer.js" defer></script>
  <script src="js/eventsCert.js" defer></script>
  <script src="js/eventsAuth.js" defer></script>
  <script src="js/eventsSync.js" defer></script>
  <script src="js/eventsTable.js" defer></script>
  <script src="js/eventsFilters.js" defer></script>
  <script src="js/eventsNsu.js" defer></script>
  <script src="js/eventsNav.js" defer></script>
  <script src="js/eventsScheduler.js" defer></script>
  <script src="js/events.js" defer></script>
  <script src="app.js" defer></script>
  <script src="js/bootComponents.js" defer></script>
  <script src="js/bootData.js" defer></script>
  <script src="js/boot.js" defer></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/sw.js').then(function (reg) {
          // Força checagem de nova versão do SW (auth/boot)
          try { reg.update(); } catch (e) {}
          if (reg.waiting) {
            reg.waiting.postMessage({ type: 'SKIP_WAITING' });
          }
        }).catch(function () {});
        // Se o SW mudou, recarrega 1x para pegar JS novo
        var refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', function () {
          if (refreshing) return;
          refreshing = true;
          window.location.reload();
        });
      });
    }
  </script>
</body>
</html>
