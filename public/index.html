<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestão NFS-e Nacional</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <meta name="theme-color" content="#0b0f19">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <!-- display=swap evita FOIT; pesos reduzidos -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <!-- CSS em paralelo (sem @import em cascata) -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/buttons.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/metrics.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/certificates.css">
  <link rel="stylesheet" href="css/table.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body class="light-mode">
  <!-- Background glow effect -->
  <div class="glass-bg"></div>

  <!-- Container placeholders loaded dynamically -->
  <div id="auth-screen-container"></div>

  <div class="app-layout" id="app-layout" style="display: none;">
    <div id="sidebar-container"></div>

    <!-- Main Content Area -->
    <main class="main-content">
      <!-- Top Navbar -->
      <header class="navbar">
        <div class="navbar-title">
          <h1 id="page-title"></h1>
          <p id="page-subtitle">Gestão de XMLs NFS-e Nacional por unidade</p>
        </div>
        
        <!-- Active Certificate Info -->
        <div class="navbar-actions">
          <div class="cert-status-badge user-status-badge">
            <span id="auth-user-email">Sessão ativa</span>
            <button class="btn btn-secondary btn-sm" id="btn-logout" type="button">Sair</button>
          </div>
          <div class="cert-status-badge">
            <span class="status-indicator" id="navbar-cert-indicator"></span>
            <span id="navbar-cert-text">Verificando certificado...</span>
          </div>
        </div>
      </header>

      <div id="view-dashboard-container"></div>
      <div id="view-download-container"></div>
      <div id="view-certificado-container"></div>
      <div id="view-regras-container"></div>

      <!-- Footer -->
      <footer class="app-footer">
        <p>v1.4.1 - NFS-e Nacional com cancelamentos e carregamento otimizado.</p>
      </footer>
    </main>
  </div>

  <script src="js/utils.js" defer></script>
  <script src="js/dataCache.js" defer></script>
  <script src="js/panels-bundle.js" defer></script>
  <script src="js/api.js" defer></script>
  <script src="js/uiElements.js" defer></script>
  <script src="js/uiTable.js" defer></script>
  <script src="js/ui.js" defer></script>
  <script src="js/syncController.js" defer></script>
  <script src="js/eventsCert.js" defer></script>
  <script src="js/events.js" defer></script>
  <script src="app.js" defer></script>
</body>
</html>
