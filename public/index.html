<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XML NFS-e em Lote</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Background glow effect -->
  <div class="glass-bg"></div>

  <!-- Container placeholders loaded dynamically -->
  <div id="auth-screen-container"></div>

  <div class="app-layout" id="app-layout" style="display: none;">
    <div id="sidebar-container"></div>

    <!-- Main Content Area -->
    <main class="main-content">
      <!-- Top Navbar -->
      <header class="navbar">
        <div class="navbar-title">
          <h1 id="page-title">Painel de Sincronização</h1>
          <p id="page-subtitle">Gerencie o download de documentos fiscais mTLS</p>
        </div>
        
        <!-- Active Certificate Info -->
        <div class="navbar-actions">
          <div class="cert-status-badge user-status-badge">
            <span id="auth-user-email">Sessão ativa</span>
            <button class="btn btn-secondary btn-sm" id="btn-logout" type="button">Sair</button>
          </div>
          <div class="cert-status-badge">
            <span class="status-indicator" id="navbar-cert-indicator"></span>
            <span id="navbar-cert-text">Verificando certificado...</span>
          </div>
        </div>
      </header>

      <div id="view-download-container"></div>
      <div id="view-certificado-container"></div>
      <div id="view-regras-container"></div>

      <!-- Footer -->
      <footer class="app-footer">
        <p>XML NFS-e em Lote v1.3.0 - Executando localmente via conexão mTLS criptografada.</p>
      </footer>
    </main>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/syncController.js"></script>
  <script src="js/events.js"></script>
  <script src="app.js"></script>
</body>
</html>
